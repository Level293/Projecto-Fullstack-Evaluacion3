server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webmvc:
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origin-patterns: "*"
                allowed-methods: "*"
                allowed-headers: "*"
                exposed-headers: "*"
                allow-credentials: false
                max-age: 3600
                
          routes:
            - id: hoteles-service
              uri: lb://hoteles-service
              predicates:
                - Path=/api/v1/hoteles/**, /hoteles/api-docs/**

            - id: productos-service
              uri: lb://productos-service
              predicates:
                - Path=/api/v1/productos/**, /productos/api-docs/**

            - id: usuarios-service
              uri: lb://usuarios-service
              predicates:
                - Path=/api/v1/usuarios/**, /usuarios/api-docs/**

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
    urls:
      - name: Microservicio Hoteles
        url: /hoteles/api-docs
      - name: Microservicio Productos
        url: /productos/api-docs
      - name: Microservicio Usuarios
        url: /usuarios/api-docs
    disable-swagger-default-url: true
    display-request-duration: true
  api-docs:
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: false
