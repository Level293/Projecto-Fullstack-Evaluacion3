server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: hoteles-service
              uri: lb://hoteles-service
              predicates:
                - Path=/api/v1/hoteles/**

            # Microservicio de Productos: acepta sus endpoints de negocio y sus docs
            - id: productos-service
              uri: lb://productos-service
              predicates:
                - Path=/api/v1/productos/**, /productos/api-docs/**

            # Microservicio de Usuarios: acepta sus endpoints de negocio y sus docs
            - id: usuarios-service
              uri: lb://usuarios-service
              predicates:
                - Path=/api/v1/usuarios/**, /usuarios/api-docs/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Configuración del agregador visual de Swagger coincidiendo con los Paths de arriba
springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
    urls:
      - name: Microservicio Productos
        url: /productos/api-docs
      - name: Microservicio Usuarios
        url: /usuarios/api-docs
  api-docs:
    enabled: true